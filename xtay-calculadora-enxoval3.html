<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Enxoval — Xtay Smart Hotel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Public+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Public Sans', sans-serif;
      background: #f0f0f6;
      color: #191346;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
      background: #fff;
      box-shadow: 0 0 48px rgba(25,19,70,0.10);
    }

    .header {
      background: #191346;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .logo {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 24px;
      color: #F3703A;
      letter-spacing: -0.5px;
    }
    .logo-tag {
      font-family: 'Public Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      border-left: 1px solid rgba(255,255,255,0.18);
      padding-left: 14px;
      line-height: 1.5;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #f7f7f9;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      max-width: 90%;
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Poppins', sans-serif;
      font-weight: 700; font-size: 12px;
    }
    .msg.bot  .msg-avatar { background: #F3703A; color: #fff; }
    .msg.user .msg-avatar { background: #191346; color: #fff; }

    .msg-bubble {
      padding: 11px 15px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.bot .msg-bubble {
      background: #fff;
      color: #191346;
      border: 0.5px solid #e0e0ec;
      border-radius: 0 16px 16px 16px;
    }
    .msg.user .msg-bubble {
      background: #F3703A;
      color: #fff;
      border-radius: 16px 0 16px 16px;
    }
    .msg-bubble strong { font-weight: 600; }

    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 10px 18px;
      background: #191346;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .dl-btn:hover  { background: #F3703A; }
    .dl-btn:active { transform: scale(0.97); }
    .dl-btn svg { fill: #fff; flex-shrink: 0; }

    .typing-dots { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
    .typing-dots span {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: #F3703A;
      animation: tdot 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot {
      0%,60%,100% { transform: translateY(0); opacity:.5; }
      30% { transform: translateY(-7px); opacity:1; }
    }

    .chips-bar {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 10px 16px 6px;
      background: #fff;
      border-top: 1px solid #ebebf3;
    }
    .chip {
      font-family: 'Public Sans', sans-serif;
      font-size: 12px; font-weight: 500;
      color: #191346; background: #f0f0f8;
      border: 1px solid #dddde8; border-radius: 20px;
      padding: 6px 13px; cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }
    .chip:hover { background: #F3703A; color: #fff; border-color: #F3703A; }

    .input-bar {
      display: flex; gap: 10px;
      padding: 12px 16px 14px;
      background: #fff;
      border-top: 1px solid #ebebf3;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      border: 1px solid #dddde8; border-radius: 22px;
      padding: 10px 16px;
      font-family: 'Public Sans', sans-serif; font-size: 14px; line-height: 1.5;
      resize: none; outline: none;
      min-height: 44px; max-height: 130px; overflow-y: auto;
      color: #191346; background: #f7f7fb;
      transition: border-color .15s, background .15s;
    }
    .chat-input::placeholder { color: #aaa; }
    .chat-input:focus { border-color: #F3703A; background: #fff; }

    .send-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: #F3703A; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    .send-btn:hover  { background: #e05e28; }
    .send-btn:active { transform: scale(.94); }
    .send-btn:disabled { background: #ccc; cursor: not-allowed; }
    .send-btn svg { fill: #fff; display: block; }

    .footer {
      text-align: center; font-size: 11px; color: #aaa;
      padding: 6px 16px 10px;
      background: #fff; border-top: 1px solid #f0f0f6;
      flex-shrink: 0;
    }

    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

    @media (max-width: 480px) {
      .msg { max-width: 96%; }
      .logo { font-size: 20px; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">xtay</div>
    <div class="logo-tag">Calculadora de Enxoval<br>Estadias Inteligentes</div>
  </div>

  <div class="chat-area" id="chat"></div>

  <div class="chips-bar" id="chipsBar">
    <span class="chip" onclick="sendChip('Quero calcular o enxoval de um novo empreendimento')">🛏 Calcular enxoval</span>
    <span class="chip" onclick="sendChip('Quais são os fornecedores oficiais Xtay?')">🏭 Fornecedores</span>
    <span class="chip" onclick="sendChip('Qual o padrão dos lençóis Xtay?')">📋 Padrão têxtil</span>
    <span class="chip" onclick="sendChip('Como funciona o fator de giro?')">🔄 Fator de giro</span>
  </div>

  <div class="input-bar">
    <textarea class="chat-input" id="inp"
      placeholder="Descreva o empreendimento ou faça uma pergunta..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Enviar">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>

  <div class="footer">Xtay Smart Hotel &mdash; Uso interno &mdash; v2.0</div>
</div>

<script>
const SYSTEM_PROMPT = `Você é a Calculadora de Enxoval da Xtay Smart Hotel. Ajude colaboradores a dimensionar o enxoval de empreendimentos com precisão.

TABELA DE ITENS:
Item | R$ Unit | Giro | Qtd por unidade
PROTETOR COLCHÃO QUEEN | 76 | 1.2 | 1 por cama queen
LENÇOL QUEEN | 60 | 3 | 2 por cama queen
EDREDON QUEEN | 180 | 1.2 | 1 por cama queen
CAPA EDREDON QUEEN | 130 | 3 | 1 por cama queen
COBERTOR QUEEN | 130 | 1.2 | 1 por cama queen
TRAVESSEIRO QUEEN | 75 | 1.2 | 2 por cama queen
PROTETOR TRAVESSEIRO QUEEN | 13 | 1.2 | 2 por cama queen
FRONHA QUEEN | 12 | 3 | 2 por cama queen
PROTETOR COLCHÃO SOLTEIRO | 76 | 1.2 | 1 por cama solteiro
LENÇOL SOLTEIRO | 60 | 3 | 2 por cama solteiro
EDREDON SOLTEIRO | 180 | 1.2 | 1 por cama solteiro
CAPA EDREDON SOLTEIRO | 130 | 3 | 1 por cama solteiro
COBERTOR SOLTEIRO | 130 | 1.2 | 1 por cama solteiro
TRAVESSEIRO SOLTEIRO | 75 | 1.2 | 1 por cama solteiro
PROTETOR TRAVESSEIRO SOLTEIRO | 13 | 1.2 | 1 por cama solteiro
FRONHA SOLTEIRO | 12 | 3 | 1 por cama solteiro
LENÇOL SOFÁ CAMA | 60 | 3 | 2 por sofá-cama
COBERTOR SOFÁ CAMA | 130 | 1.2 | 1 por sofá-cama
TRAVESSEIRO SOFÁ CAMA | 75 | 1.2 | 1 por sofá-cama
PROTETOR TRAVESSEIRO SOFÁ CAMA | 13 | 1.2 | 1 por sofá-cama
TOALHA BANHO | 56 | 3 | máx pessoas por apto
TOALHA ROSTO | 18 | 3 | máx pessoas por apto
TOALHA PISO | 17 | 3 | qtd banheiros por apto

FÓRMULA: Qtd Total = Qtd_por_unidade × Qtd_unidades_no_apto × Num_aptos × Fator_giro

REGRA TOALHAS:
- Banho e Rosto = máximo de pessoas por apto (Queen=2, Solteiro=1, Sofá=2 — soma dos máximos)
- Piso = número de banheiros

TIPOLOGIAS TÍPICAS:
- Studio: 1 Queen, 1 banheiro
- 1 Dorm: 1 Queen, 1 banheiro (pode ter sofá-cama)
- 2 Dorm: 1 Queen + 1 Solteiro ou 2 Solteiros, 1-2 banheiros
- 3 Dorm: 1 Queen + 2 Solteiros, 2 banheiros

FORNECEDORES OFICIAIS:
1. Maxlink Têxtil — maxlink.com.br — Ernesto: +55 11 99203-7376
2. Altenburg Linha Hotel — altenburg.com.br/linha-hotel — Rui: +55 47 9982-7715

INSTRUÇÕES CRÍTICAS:
1. Quando fizer um cálculo de enxoval completo, inclua OBRIGATORIAMENTE ao final da resposta um bloco JSON entre as tags ===EXCEL_DATA_START=== e ===EXCEL_DATA_END===
2. O bloco JSON deve seguir EXATAMENTE este formato:

===EXCEL_DATA_START===
{
  "empreendimento": "nome ou descrição do empreendimento",
  "data": "DD/MM/AAAA",
  "tipologias": [
    {
      "nome": "STUDIO",
      "aptos": 10,
      "banheiros": 1,
      "queen": 1,
      "solteiro": 0,
      "sofa": 0,
      "itens": [
        { "item": "PROTETOR COLCHÃO QUEEN", "qtd": 12, "unitario": 76, "total": 912 }
      ],
      "subtotal": 912
    }
  ],
  "resumo": [
    { "item": "PROTETOR COLCHÃO QUEEN", "qtd_total": 12, "unitario": 76, "total": 912 }
  ],
  "total_pecas": 100,
  "total_investimento": 15000
}
===EXCEL_DATA_END===

3. Responda SEMPRE em português do Brasil
4. Exiba o cálculo em texto legível ANTES do bloco JSON
5. Ao final de qualquer cálculo, mencione os fornecedores`;

let history = [];
let chipsHidden = false;

function addMessage(role, text, withExcel) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? 'X' : 'VC';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  const cleanText = text.replace(/===EXCEL_DATA_START===[\s\S]*?===EXCEL_DATA_END===/g, '').trim();

  bubble.innerHTML = cleanText
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');

  if (withExcel) {
    const br = document.createElement('br');
    const btn = document.createElement('button');
    btn.className = 'dl-btn';
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 8h14v2H5v-2z"/></svg> Baixar Planilha Excel`;
    btn.onclick = withExcel;
    bubble.appendChild(br);
    bubble.appendChild(btn);
  }

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = `<div class="msg-avatar" style="background:#F3703A;color:#fff;font-family:'Poppins',sans-serif;font-weight:700;font-size:12px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;">X</div><div class="msg-bubble" style="background:#fff;border:0.5px solid #e0e0ec;border-radius:0 16px 16px 16px;padding:11px 15px;"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function hideChips() {
  if (!chipsHidden) {
    document.getElementById('chipsBar').style.display = 'none';
    chipsHidden = true;
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function extractExcelData(text) {
  const match = text.match(/===EXCEL_DATA_START===([\s\S]*?)===EXCEL_DATA_END===/);
  if (!match) return null;
  try { return JSON.parse(match[1].trim()); }
  catch(e) { console.warn('JSON parse error:', e); return null; }
}

function gerarExcel(data) {
  const wb = XLSX.utils.book_new();

  const LARANJA  = 'FFF3703A';
  const AZUL     = 'FF191346';
  const BRANCO   = 'FFFFFFFF';
  const CINZA_CL = 'FFF5F5F8';
  const BORDA    = 'FFE0E0EC';

  const border = {
    top:    { style:'thin', color:{ rgb: BORDA } },
    bottom: { style:'thin', color:{ rgb: BORDA } },
    left:   { style:'thin', color:{ rgb: BORDA } },
    right:  { style:'thin', color:{ rgb: BORDA } }
  };

  const hdr = (bg, fg, bold) => ({
    font: { name:'Arial', sz:11, bold:!!bold, color:{ rgb: fg||BRANCO } },
    fill: { fgColor:{ rgb: bg||AZUL } },
    alignment: { horizontal:'center', vertical:'center', wrapText:true },
    border
  });

  const cell = (bold, bg) => ({
    font: { name:'Arial', sz:10, bold:!!bold, color:{ rgb: AZUL } },
    fill: { fgColor:{ rgb: bg||BRANCO } },
    alignment: { vertical:'center', wrapText:true },
    border
  });

  const num = (bold, bg) => ({
    ...cell(bold, bg),
    alignment: { horizontal:'right', vertical:'center' },
    numFmt: '#,##0'
  });

  const brl = (bold, bg) => ({
    ...cell(bold, bg),
    alignment: { horizontal:'right', vertical:'center' },
    numFmt: 'R$ #,##0.00'
  });

  function sc(ws, addr, v, s) {
    ws[addr] = { v, t: typeof v === 'number' ? 'n' : 's' };
    if (s) ws[addr].s = s;
  }

  function catItem(nome) {
    if (nome.includes('TOALHA')) return 'Banho';
    if (nome.includes('SOFÁ') || nome.includes('SOFA')) return 'Sofá-Cama';
    if (nome.includes('SOLTEIRO')) return 'Cama Solteiro';
    if (nome.includes('TRAVESSEIRO') || nome.includes('FRONHA')) return 'Travesseiro/Fronha';
    return 'Cama Queen';
  }

  // ── ABA RESUMO ──
  (function() {
    const ws = {};
    const merges = [];
    let r = 1;

    sc(ws, `A${r}`, 'RESUMO GERAL — ENXOVAL XTAY', hdr(AZUL, BRANCO, true));
    merges.push({ s:{r:r-1,c:0}, e:{r:r-1,c:4} });
    r++;

    sc(ws, `A${r}`, 'Empreendimento: ' + (data.empreendimento || '—'), cell(true, CINZA_CL));
    merges.push({ s:{r:r-1,c:0}, e:{r:r-1,c:4} });
    r++;

    const hoje = data.data || new Date().toLocaleDateString('pt-BR');
    sc(ws, `A${r}`, 'Data: ' + hoje, cell(false, CINZA_CL));
    merges.push({ s:{r:r-1,c:0}, e:{r:r-1,c:4} });
    r += 2;

    ['ITEM', 'QTD TOTAL', 'R$ UNITÁRIO', 'R$ TOTAL', 'CATEGORIA'].forEach((h, i) => {
      sc(ws, String.fromCharCode(65+i) + r, h, hdr(LARANJA, BRANCO, true));
    });
    r++;

    (data.resumo || []).forEach((item, idx) => {
      const bg = idx % 2 === 0 ? BRANCO : CINZA_CL;
      sc(ws, `A${r}`, item.item,      cell(false, bg));
      sc(ws, `B${r}`, item.qtd_total, num(false, bg));
      sc(ws, `C${r}`, item.unitario,  brl(false, bg));
      sc(ws, `D${r}`, item.total,     brl(false, bg));
      sc(ws, `E${r}`, catItem(item.item), cell(false, bg));
      r++;
    });

    r++;
    sc(ws, `A${r}`, 'TOTAL DE PEÇAS', hdr(AZUL, BRANCO, true));
    merges.push({ s:{r:r-1,c:0}, e:{r:r-1,c:3} });
    sc(ws, `E${r}`, data.total_pecas || 0, { ...num(true), font:{name:'Arial',sz:12,bold:true,color:{rgb:BRANCO}}, fill:{fgColor:{rgb:AZUL}}, alignment:{horizontal:'center',vertical:'center'}, border });
    r++;

    sc(ws, `A${r}`, 'INVESTIMENTO TOTAL ESTIMADO', hdr(LARANJA, BRANCO, true));
    merges.push({ s:{r:r-1,c:0}, e:{r:r-1,c:3} });
    sc(ws, `E${r}`, data.total_investimento || 0, { ...brl(true), font:{name:'Arial',sz:12,bold:true,color:{rgb:BRANCO}}, fill:{fgColor:{rgb:LARANJA}}, alignment:{horizontal:'center',vertical:'center'}, border });

    ws['!merges'] = merges;
    ws['!ref'] = `A1:E${r}`;
    ws['!cols'] = [{wch:36},{wch:14},{wch:16},{wch:18},{wch:20}];
    ws['!rows'] = Array(r).fill({hpt:20});

    XLSX.utils.book_append_sheet(wb, ws, 'RESUMO');
  })();

  // ── ABAS TIPOLOGIA ──
  (data.tipologias || []).forEach(tip => {
    const ws = {};
    const merges = [];
    let r = 1;

    sc(ws, `A${r}`, tip.nome + ' — Enxoval Detalhado', hdr(AZUL, BRANCO, true));
    merges.push({ s:{r:r-1,c:0}, e:{r:r-1,c:3} });
    r++;

    [
      ['Qtd de Apartamentos', tip.aptos],
      ['Banheiros por Apto',  tip.banheiros],
      ['Camas Queen',         tip.queen],
      ['Camas Solteiro',      tip.solteiro],
      ['Sofás-Cama',          tip.sofa]
    ].forEach(([k,v]) => {
      sc(ws, `A${r}`, k, cell(true, CINZA_CL));
      sc(ws, `B${r}`, v, num(false, CINZA_CL));
      merges.push({ s:{r:r-1,c:0}, e:{r:r-1,c:0} });
      r++;
    });
    r++;

    ['ITEM','QTD TOTAL','R$ UNITÁRIO','R$ TOTAL'].forEach((h,i) => {
      sc(ws, String.fromCharCode(65+i)+r, h, hdr(LARANJA, BRANCO, true));
    });
    r++;

    (tip.itens || []).forEach((item, idx) => {
      const bg = idx % 2 === 0 ? BRANCO : CINZA_CL;
      sc(ws, `A${r}`, item.item,     cell(false, bg));
      sc(ws, `B${r}`, item.qtd,      num(false, bg));
      sc(ws, `C${r}`, item.unitario, brl(false, bg));
      sc(ws, `D${r}`, item.total,    brl(false, bg));
      r++;
    });

    r++;
    sc(ws, `A${r}`, 'SUBTOTAL ' + tip.nome, hdr(AZUL, BRANCO, true));
    merges.push({ s:{r:r-1,c:0}, e:{r:r-1,c:2} });
    sc(ws, `D${r}`, tip.subtotal || 0, { ...brl(true), font:{name:'Arial',sz:11,bold:true,color:{rgb:BRANCO}}, fill:{fgColor:{rgb:AZUL}}, alignment:{horizontal:'right',vertical:'center'}, border });

    ws['!merges'] = merges;
    ws['!ref'] = `A1:D${r}`;
    ws['!cols'] = [{wch:36},{wch:14},{wch:16},{wch:18}];
    ws['!rows'] = Array(r).fill({hpt:20});

    XLSX.utils.book_append_sheet(wb, ws, tip.nome.substring(0,31));
  });

  // ── ABA FORNECEDORES ──
  (function() {
    const ws = {};
    const merges = [];
    let r = 1;

    sc(ws, `A${r}`, 'FORNECEDORES OFICIAIS XTAY', hdr(AZUL, BRANCO, true));
    merges.push({ s:{r:r-1,c:0}, e:{r:r-1,c:2} });
    r += 2;

    sc(ws, `A${r}`, 'Maxlink Têxtil', hdr(LARANJA, BRANCO, true));
    merges.push({ s:{r:r-1,c:0}, e:{r:r-1,c:2} });
    r++;
    [['Site','www.maxlink.com.br'],['Contato','Ernesto'],['Fone','+55 11 99203-7376']].forEach(([k,v],i) => {
      const bg = i%2===0?CINZA_CL:BRANCO;
      sc(ws,`A${r}`,k,cell(true,bg)); sc(ws,`B${r}`,v,cell(false,bg)); r++;
    });
    r++;

    sc(ws, `A${r}`, 'Altenburg — Linha Hotel', hdr(LARANJA, BRANCO, true));
    merges.push({ s:{r:r-1,c:0}, e:{r:r-1,c:2} });
    r++;
    [['Site','www.altenburg.com.br/linha-hotel'],['Contato','Rui'],['Fone','+55 47 9982-7715']].forEach(([k,v],i) => {
      const bg = i%2===0?CINZA_CL:BRANCO;
      sc(ws,`A${r}`,k,cell(true,bg)); sc(ws,`B${r}`,v,cell(false,bg)); r++;
    });

    ws['!merges'] = merges;
    ws['!ref'] = `A1:C${r}`;
    ws['!cols'] = [{wch:20},{wch:42},{wch:20}];

    XLSX.utils.book_append_sheet(wb, ws, 'Fornecedores');
  })();

  const nome = (data.empreendimento || 'Enxoval_Xtay')
    .replace(/[^a-zA-Z0-9_\-\u00C0-\u017E ]/g,'').trim().replace(/ /g,'_');
  XLSX.writeFile(wb, `Enxoval_${nome}.xlsx`);
}

async function callAPI(userText) {
  history.push({ role: 'user', content: userText });
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();

    if (data.error) {
      removeTyping();
      addMessage('bot', '⚠️ Erro na API: ' + (data.error.message || 'Tente novamente.'));
    } else {
      const reply = data.content?.[0]?.text || 'Não foi possível processar.';
      history.push({ role: 'assistant', content: reply });
      removeTyping();
      const excelData = extractExcelData(reply);
      addMessage('bot', reply, excelData ? () => gerarExcel(excelData) : null);
    }
  } catch(e) {
    removeTyping();
    addMessage('bot', '⚠️ Erro de conexão. Verifique sua internet e tente novamente.');
  }

  document.getElementById('sendBtn').disabled = false;
  document.getElementById('inp').focus();
}

function sendMessage() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  hideChips();
  addMessage('user', text);
  inp.value = '';
  inp.style.height = '';
  callAPI(text);
}

function sendChip(text) {
  hideChips();
  addMessage('user', text);
  callAPI(text);
}
