<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Enxoval — Xtay Smart Hotel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Public+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Public Sans', sans-serif; background: #f0f0f6; color: #191346; }
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 780px; margin: 0 auto; background: #fff; box-shadow: 0 0 48px rgba(25,19,70,0.10); }
    .header { background: #191346; padding: 14px 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .logo { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 24px; color: #F3703A; letter-spacing: -0.5px; }
    .logo-tag { font-family: 'Public Sans', sans-serif; font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.5); border-left: 1px solid rgba(255,255,255,0.18); padding-left: 14px; line-height: 1.5; }
    .chat-area { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; background: #f7f7f9; scroll-behavior: smooth; }
    .msg { display: flex; gap: 10px; align-items: flex-start; max-width: 90%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }
    .msg-avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 12px; }
    .msg.bot .msg-avatar { background: #F3703A; color: #fff; }
    .msg.user .msg-avatar { background: #191346; color: #fff; }
    .msg-bubble { padding: 11px 15px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
    .msg.bot .msg-bubble { background: #fff; color: #191346; border: 0.5px solid #e0e0ec; border-radius: 0 16px 16px 16px; }
    .msg.user .msg-bubble { background: #F3703A; color: #fff; border-radius: 16px 0 16px 16px; }
    .msg-bubble strong { font-weight: 600; }
    .dl-btn { display: inline-flex; align-items: center; gap: 8px; margin-top: 14px; padding: 10px 18px; background: #191346; color: #fff; border: none; border-radius: 10px; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .dl-btn:hover { background: #F3703A; }
    .dl-btn:active { transform: scale(0.97); }
    .dl-btn svg { fill: #fff; flex-shrink: 0; }
    .typing-dots { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
    .typing-dots span { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #F3703A; animation: tdot 1.2s infinite ease-in-out; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot { 0%,60%,100% { transform: translateY(0); opacity:.5; } 30% { transform: translateY(-7px); opacity:1; } }
    .chips-bar { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 16px 6px; background: #fff; border-top: 1px solid #ebebf3; }
    .chip { font-family: 'Public Sans', sans-serif; font-size: 12px; font-weight: 500; color: #191346; background: #f0f0f8; border: 1px solid #dddde8; border-radius: 20px; padding: 6px 13px; cursor: pointer; transition: background .15s, border-color .15s, color .15s; white-space: nowrap; }
    .chip:hover { background: #F3703A; color: #fff; border-color: #F3703A; }
    .input-bar { display: flex; gap: 10px; padding: 12px 16px 14px; background: #fff; border-top: 1px solid #ebebf3; align-items: flex-end; flex-shrink: 0; }
    .chat-input { flex: 1; border: 1px solid #dddde8; border-radius: 22px; padding: 10px 16px; font-family: 'Public Sans', sans-serif; font-size: 14px; line-height: 1.5; resize: none; outline: none; min-height: 44px; max-height: 130px; overflow-y: auto; color: #191346; background: #f7f7fb; transition: border-color .15s, background .15s; }
    .chat-input::placeholder { color: #aaa; }
    .chat-input:focus { border-color: #F3703A; background: #fff; }
    .send-btn { width: 44px; height: 44px; border-radius: 50%; background: #F3703A; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s, transform .1s; }
    .send-btn:hover { background: #e05e28; }
    .send-btn:active { transform: scale(.94); }
    .send-btn:disabled { background: #ccc; cursor: not-allowed; }
    .send-btn svg { fill: #fff; display: block; }
    .footer { text-align: center; font-size: 11px; color: #aaa; padding: 6px 16px 10px; background: #fff; border-top: 1px solid #f0f0f6; flex-shrink: 0; }
    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
    @media (max-width: 480px) { .msg { max-width: 96%; } .logo { font-size: 20px; } }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">xtay</div>
    <div class="logo-tag">Calculadora de Enxoval<br>Estadias Inteligentes</div>
  </div>
  <div class="chat-area" id="chat"></div>
  <div class="chips-bar" id="chipsBar">
    <span class="chip" onclick="sendChip('Quero calcular o enxoval de um novo empreendimento')">🛏 Calcular enxoval</span>
    <span class="chip" onclick="sendChip('Quais são os fornecedores oficiais Xtay?')">🏭 Fornecedores</span>
    <span class="chip" onclick="sendChip('Qual o padrão dos lençóis Xtay?')">📋 Padrão têxtil</span>
    <span class="chip" onclick="sendChip('Como funciona o fator de giro?')">🔄 Fator de giro</span>
  </div>
  <div class="input-bar">
    <textarea class="chat-input" id="inp" placeholder="Descreva o empreendimento ou faça uma pergunta..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Enviar">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="footer">Xtay Smart Hotel &mdash; Uso interno &mdash; v3.0</div>
</div>

<script>
const ITENS_TABELA = {
  'PROTETOR COLCHÃO QUEEN': { preco: 76, giro: 1.2, qtd: 1, tipo: 'queen' },
  'LENÇOL QUEEN': { preco: 60, giro: 3, qtd: 2, tipo: 'queen' },
  'EDREDON QUEEN': { preco: 180, giro: 1.2, qtd: 1, tipo: 'queen' },
  'CAPA EDREDON QUEEN': { preco: 130, giro: 3, qtd: 1, tipo: 'queen' },
  'COBERTOR QUEEN': { preco: 130, giro: 1.2, qtd: 1, tipo: 'queen' },
  'TRAVESSEIRO QUEEN': { preco: 75, giro: 1.2, qtd: 2, tipo: 'queen' },
  'PROTETOR TRAVESSEIRO QUEEN': { preco: 13, giro: 1.2, qtd: 2, tipo: 'queen' },
  'FRONHA QUEEN': { preco: 12, giro: 3, qtd: 2, tipo: 'queen' },
  'PROTETOR COLCHÃO SOLTEIRO': { preco: 76, giro: 1.2, qtd: 1, tipo: 'solteiro' },
  'LENÇOL SOLTEIRO': { preco: 60, giro: 3, qtd: 2, tipo: 'solteiro' },
  'EDREDON SOLTEIRO': { preco: 180, giro: 1.2, qtd: 1, tipo: 'solteiro' },
  'CAPA EDREDON SOLTEIRO': { preco: 130, giro: 3, qtd: 1, tipo: 'solteiro' },
  'COBERTOR SOLTEIRO': { preco: 130, giro: 1.2, qtd: 1, tipo: 'solteiro' },
  'TRAVESSEIRO SOLTEIRO': { preco: 75, giro: 1.2, qtd: 1, tipo: 'solteiro' },
  'PROTETOR TRAVESSEIRO SOLTEIRO': { preco: 13, giro: 1.2, qtd: 1, tipo: 'solteiro' },
  'FRONHA SOLTEIRO': { preco: 12, giro: 3, qtd: 1, tipo: 'solteiro' },
  'LENÇOL SOFÁ CAMA': { preco: 60, giro: 3, qtd: 2, tipo: 'sofa' },
  'COBERTOR SOFÁ CAMA': { preco: 130, giro: 1.2, qtd: 1, tipo: 'sofa' },
  'TRAVESSEIRO SOFÁ CAMA': { preco: 75, giro: 1.2, qtd: 1, tipo: 'sofa' },
  'PROTETOR TRAVESSEIRO SOFÁ CAMA': { preco: 13, giro: 1.2, qtd: 1, tipo: 'sofa' },
  'TOALHA BANHO': { preco: 56, giro: 3, qtd: 0, tipo: 'toalha' },
  'TOALHA ROSTO': { preco: 18, giro: 3, qtd: 0, tipo: 'toalha' },
  'TOALHA PISO': { preco: 17, giro: 3, qtd: 0, tipo: 'toalha' }
};

let chipsHidden = false;

function addMessage(role, text, withExcel) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? 'X' : 'VC';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
  if (withExcel) {
    const br = document.createElement('br');
    const btn = document.createElement('button');
    btn.className = 'dl-btn';
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 8h14v2H5v-2z"/></svg> Baixar Planilha Excel`;
    btn.onclick = withExcel;
    bubble.appendChild(br);
    bubble.appendChild(btn);
  }
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = `<div class="msg-avatar" style="background:#F3703A;color:#fff;font-family:'Poppins',sans-serif;font-weight:700;font-size:12px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;">X</div><div class="msg-bubble" style="background:#fff;border:0.5px solid #e0e0ec;border-radius:0 16px 16px 16px;padding:11px 15px;"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function hideChips() {
  if (!chipsHidden) {
    document.getElementById('chipsBar').style.display = 'none';
    chipsHidden = true;
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function processarTexto(text) {
  text = text.toLowerCase();
  
  if (text.includes('fornecedor')) {
    return {
      resposta: `**Fornecedores Oficiais Xtay:**\n\n1. **Maxlink Têxtil**\n   Site: www.maxlink.com.br\n   Contato: Ernesto\n   Fone: +55 11 99203-7376\n\n2. **Altenburg Linha Hotel**\n   Site: www.altenburg.com.br/linha-hotel\n   Contato: Rui\n   Fone: +55 47 9982-7715`,
      excel: null
    };
  }
  
  if (text.includes('padrão') || text.includes('lençol')) {
    return {
      resposta: `**Padrão Têxtil Xtay:**\n\n- **Lençóis**: 2 por cama (cobertura de 3x)\n- **Edredons/Cobertores**: 1 por cama (rotação 1.2x)\n- **Travesseiros**: 1-2 por cama (rotação 1.2x)\n- **Fronhas**: 2 por cama (cobertura de 3x)\n\nO padrão garante conforto e durabilidade com rotação eficiente.`,
      excel: null
    };
  }
  
  if (text.includes('giro') || text.includes('fator')) {
    return {
      resposta: `**Fator de Giro Xtay:**\n\n- **Giro 3x**: Itens de rotação rápida (lençóis, fronhas, toalhas)\n- **Giro 1.2x**: Itens de rotação lenta (edredons, cobertores, protetores)\n\n**Fórmula:** Quantidade = Item/Cama × Camas × Apts × Fator de Giro\n\nEx: 2 lençóis × 1 queen × 10 aptos × 3 = 60 lençóis`,
      excel: null
    };
  }
  
  // Tentar extrair números para cálculo
  const numeros = text.match(/\d+/g) || [];
  if (numeros.length > 0 || text.includes('calcula')) {
    return calcularEnxoval(text);
  }
  
  return {
    resposta: `Desculpe, não entendi. Você pode:\n\n1. Descrever um empreendimento: "10 studios, 5 aptos 2 dorm"\n2. Perguntar sobre fornecedores ou padrões\n3. Usar um dos atalhos rápidos acima`,
    excel: null
  };
}

function calcularEnxoval(text) {
  const parts = text.split(/[,;ou]/);
  let tipologias = [];
  let totalPecas = 0;
  let totalInvest = 0;
  let resumo = {};
  
  parts.forEach(part => {
    const match = part.match(/(\d+)\s*(?:studio|studios|apto|aptos|1\s*dorm|2\s*dorm|3\s*dorm)/i);
    if (!match) return;
    
    const qtd = parseInt(match[1]);
    const tipo = match[0].toLowerCase();
    let config = { nome: '', queens: 0, solteiros: 0, sofas: 0, banheiros: 1 };
    
    if (tipo.includes('studio')) {
      config = { nome: 'STUDIO', queens: 1, solteiros: 0, sofas: 0, banheiros: 1 };
    } else if (tipo.includes('1 dorm')) {
      config = { nome: '1 DORMITÓRIO', queens: 1, solteiros: 0, sofas: 0, banheiros: 1 };
    } else if (tipo.includes('2 dorm')) {
      config = { nome: '2 DORMITÓRIOS', queens: 1, solteiros: 1, sofas: 0, banheiros: 2 };
    } else if (tipo.includes('3 dorm')) {
      config = { nome: '3 DORMITÓRIOS', queens: 1, solteiros: 2, sofas: 0, banheiros: 2 };
    }
    
    let itensApto = [];
    let subtotal = 0;
    
    // Queens
    for (let i = 0; i < config.queens; i++) {
      ['PROTETOR COLCHÃO QUEEN', 'LENÇOL QUEEN', 'EDREDON QUEEN', 'CAPA EDREDON QUEEN', 'COBERTOR QUEEN', 'TRAVESSEIRO QUEEN', 'PROTETOR TRAVESSEIRO QUEEN', 'FRONHA QUEEN'].forEach(item => {
        const info = ITENS_TABELA[item];
        const qtdItem = info.qtd * qtd * info.giro;
        const totalItem = qtdItem * info.preco;
        itensApto.push({ item, qtd: Math.ceil(qtdItem), unitario: info.preco, total: Math.ceil(totalItem) });
        resumo[item] = (resumo[item] || 0) + Math.ceil(qtdItem);
        totalPecas += Math.ceil(qtdItem);
        subtotal += Math.ceil(totalItem);
      });
    }
    
    // Solteiros
    for (let i = 0; i < config.solteiros; i++) {
      ['PROTETOR COLCHÃO SOLTEIRO', 'LENÇOL SOLTEIRO', 'EDREDON SOLTEIRO', 'CAPA EDREDON SOLTEIRO', 'COBERTOR SOLTEIRO', 'TRAVESSEIRO SOLTEIRO', 'PROTETOR TRAVESSEIRO SOLTEIRO', 'FRONHA SOLTEIRO'].forEach(item => {
        const info = ITENS_TABELA[item];
        const qtdItem = info.qtd * qtd * info.giro;
        const totalItem = qtdItem * info.preco;
        itensApto.push({ item, qtd: Math.ceil(qtdItem), unitario: info.preco, total: Math.ceil(totalItem) });
        resumo[item] = (resumo[item] || 0) + Math.ceil(qtdItem);
        totalPecas += Math.ceil(qtdItem);
        subtotal += Math.ceil(totalItem);
      });
    }
    
    // Toalhas
    const pessoareas = (config.queens * 2) + (config.solteiros * 1);
    ['TOALHA BANHO', 'TOALHA ROSTO'].forEach(item => {
      const info = ITENS_TABELA[item];
      const qtdItem = pessoareas * qtd * info.giro;
      const totalItem = qtdItem * info.preco;
      itensApto.push({ item, qtd: Math.ceil(qtdItem), unitario: info.preco, total: Math.ceil(totalItem) });
      resumo[item] = (resumo[item] || 0) + Math.ceil(qtdItem);
      totalPecas += Math.ceil(qtdItem);
      subtotal += Math.ceil(totalItem);
    });
    
    const item = ITENS_TABELA['TOALHA PISO'];
    const qtdToalhaPiso = config.banheiros * qtd * item.giro;
    const totalToalhaPiso = qtdToalhaPiso * item.preco;
    itensApto.push({ item: 'TOALHA PISO', qtd: Math.ceil(qtdToalhaPiso), unitario: item.preco, total: Math.ceil(totalToalhaPiso) });
    resumo['TOALHA PISO'] = (resumo['TOALHA PISO'] || 0) + Math.ceil(qtdToalhaPiso);
    totalPecas += Math.ceil(qtdToalhaPiso);
    subtotal += Math.ceil(totalToalhaPiso);
    
    tipologias.push({
      nome: config.nome,
      aptos: qtd,
      banheiros: config.banheiros,
      queen: config.queens,
      solteiro: config.solteiros,
      sofa: 0,
      itens: itensApto,
      subtotal: Math.ceil(subtotal)
    });
    
    totalInvest += Math.ceil(subtotal);
  });
  
  if (tipologias.length === 0) {
    return {
      resposta: `Não consegui identificar o empreendimento. Tente:\n"10 studios, 5 aptos 2 dormitórios"`,
      excel: null
    };
  }
  
  const resumoArray = Object.entries(resumo).map(([item, qtd]) => ({
    item,
    qtd_total: qtd,
    unitario: ITENS_TABELA[item].preco,
    total: qtd * ITENS_TABELA[item].preco
  }));
  
  const excelData = {
    empreendimento: 'Cálculo Xtay',
    data: new Date().toLocaleDateString('pt-BR'),
    tipologias,
    resumo: resumoArray,
    total_pecas: totalPecas,
    total_investimento: totalInvest
  };
  
  const resposta = `**Cálculo do Enxoval Xtay**\n\n${tipologias.map(t => `**${t.nome}**: ${t.aptos} aptos | R$ ${t.subtotal.toLocaleString('pt-BR')}`).join('\n')}\n\n**Total de Peças**: ${totalPecas}\n**Investimento Estimado**: R$ ${totalInvest.toLocaleString('pt-BR')}\n\n**Fornecedores Oficiais**: Maxlink Têxtil (+55 11 99203-7376) | Altenburg (+55 47 9982-7715)`;
  
  return { resposta, excel: excelData };
}

function gerarExcel(data) {
  const wb = XLSX.utils.book_new();
  const LARANJA = 'FFF3703A', AZUL = 'FF191346', BRANCO = 'FFFFFFFF', CINZA = 'FFF5F5F8', BORDA = 'FFE0E0EC';
  const border = { top: { style:'thin', color:{ rgb: BORDA } }, bottom: { style:'thin', color:{ rgb: BORDA } }, left: { style:'thin', color:{ rgb: BORDA } }, right: { style:'thin', color:{ rgb: BORDA } } };
  const hdr = (bg, fg, bold) => ({ font: { name:'Arial', sz:11, bold:!!bold, color:{ rgb: fg||BRANCO } }, fill: { fgColor:{ rgb: bg||AZUL } }, alignment: { horizontal:'center', vertical:'center', wrapText:true }, border });
  const cell = (bold, bg) => ({ font: { name:'Arial', sz:10, bold:!!bold, color:{ rgb: AZUL } }, fill: { fgColor:{ rgb: bg||BRANCO } }, alignment: { vertical:'center', wrapText:true }, border });
  const num = (bold, bg) => ({ ...cell(bold, bg), alignment: { horizontal:'right', vertical:'center' }, numFmt: '#,##0' });
  const brl = (bold, bg) => ({ ...cell(bold, bg), alignment: { horizontal:'right', vertical:'center' }, numFmt: 'R$ #,##0.00' });
  
  function sc(ws, addr, v, s) { ws[addr] = { v, t: typeof v === 'number' ? 'n' : 's' }; if (s) ws[addr].s = s; }
  
  // RESUMO
  const wsResumo = {};
  let r = 1;
  sc(wsResumo, `A${r}`, 'RESUMO GERAL — ENXOVAL XTAY', hdr(AZUL, BRANCO, true));
  r += 2;
  ['ITEM', 'QTD TOTAL', 'R$ UNITÁRIO', 'R$ TOTAL'].forEach((h, i) => sc(wsResumo, String.fromCharCode(65+i) + r, h, hdr(LARANJA, BRANCO, true)));
  r++;
  data.resumo.forEach((item, idx) => {
    const bg = idx % 2 === 0 ? BRANCO : CINZA;
    sc(wsResumo, `A${r}`, item.item, cell(false, bg));
    sc(wsResumo, `B${r}`, item.qtd_total, num(false, bg));
    sc(wsResumo, `C${r}`, item.unitario, brl(false, bg));
    sc(wsResumo, `D${r}`, item.total, brl(false, bg));
    r++;
  });
  r++;
  sc(wsResumo, `A${r}`, 'TOTAL DE PEÇAS', hdr(AZUL, BRANCO, true));
  sc(wsResumo, `D${r}`, data.total_pecas, { ...num(true), font:{name:'Arial',sz:12,bold:true,color:{rgb:BRANCO}}, fill:{fgColor:{rgb:AZUL}}, alignment:{horizontal:'center',vertical:'center'}, border });
  r++;
  sc(wsResumo, `A${r}`, 'INVESTIMENTO TOTAL', hdr(LARANJA, BRANCO, true));
  sc(wsResumo, `D${r}`, data.total_investimento, { ...brl(true), font:{name:'Arial',sz:12,bold:true,color:{rgb:BRANCO}}, fill:{fgColor:{rgb:LARANJA}}, alignment:{horizontal:'center',vertical:'center'}, border });
  wsResumo['!ref'] = `A1:D${r}`;
  wsResumo['!cols'] = [{wch:36},{wch:14},{wch:16},{wch:18}];
  XLSX.utils.book_append_sheet(wb, wsResumo, 'RESUMO');
  
  data.tipologias.forEach(tip => {
    const ws = {};
    let r = 1;
    sc(ws, `A${r}`, tip.nome + ' — Enxoval Detalhado', hdr(AZUL, BRANCO, true));
    r += 2;
    ['ITEM','QTD TOTAL','R$ UNITÁRIO','R$ TOTAL'].forEach((h,i) => sc(ws, String.fromCharCode(65+i)+r, h, hdr(LARANJA, BRANCO, true)));
    r++;
    tip.itens.forEach((item, idx) => {
      const bg = idx % 2 === 0 ? BRANCO : CINZA;
      sc(ws, `A${r}`, item.item, cell(false, bg));
      sc(ws, `B${r}`, item.qtd, num(false, bg));
      sc(ws, `C${r}`, item.unitario, brl(false, bg));
      sc(ws, `D${r}`, item.total, brl(false, bg));
      r++;
    });
    r++;
    sc(ws, `A${r}`, 'SUBTOTAL', hdr(AZUL, BRANCO, true));
    sc(ws, `D${r}`, tip.subtotal, { ...brl(true), font:{name:'Arial',sz:11,bold:true,color:{rgb:BRANCO}}, fill:{fgColor:{rgb:AZUL}}, alignment:{horizontal:'right',vertical:'center'}, border });
    ws['!ref'] = `A1:D${r}`;
    ws['!cols'] = [{wch:36},{wch:14},{wch:16},{wch:18}];
    XLSX.utils.book_append_sheet(wb, ws, tip.nome.substring(0,31));
  });
  
  const nome = (data.empreendimento || 'Enxoval_Xtay').replace(/[^a-zA-Z0-9_\-\u00C0-\u017E ]/g,'').trim().replace(/ /g,'_');
  XLSX.writeFile(wb, `Enxoval_${nome}.xlsx`);
}

function processarMensagem(userText) {
  const { resposta, excel } = processarTexto(userText);
  
  if (excel) {
    addMessage('bot', resposta, () => gerarExcel(excel));
  } else {
    addMessage('bot', resposta);
  }
}

function sendMessage() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  hideChips();
  addMessage('user', text);
  inp.value = '';
  inp.style.height = '';
  
  document.getElementById('sendBtn').disabled = true;
  setTimeout(() => {
    processarMensagem(text);
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('inp').focus();
  }, 400);
}

function sendChip(text) {
  hideChips();
  addMessage('user', text);
  document.getElementById('sendBtn').disabled = true;
  setTimeout(() => {
    processarMensagem(text);
    document.getElementById('sendBtn').disabled = false;
  }, 400);
}
