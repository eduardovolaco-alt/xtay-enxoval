<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Enxoval — Xtay Smart Hotel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Public+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Public Sans', sans-serif;
      background: #f0f0f6;
      color: #191346;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
      background: #fff;
      box-shadow: 0 0 48px rgba(25,19,70,0.10);
    }

    .header {
      background: #191346;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .logo {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 24px;
      color: #F3703A;
      letter-spacing: -0.5px;
    }
    .logo-tag {
      font-family: 'Public Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      border-left: 1px solid rgba(255,255,255,0.18);
      padding-left: 14px;
      line-height: 1.5;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #f7f7f9;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      max-width: 90%;
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }

    .msg-avatar {
      width: 34px; 
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      font-weight: 700; 
      font-size: 12px;
    }
    .msg.bot .msg-avatar { background: #F3703A; color: #fff; }
    .msg.user .msg-avatar { background: #191346; color: #fff; }

    .msg-bubble {
      padding: 11px 15px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.bot .msg-bubble {
      background: #fff;
      color: #191346;
      border: 0.5px solid #e0e0ec;
      border-radius: 0 16px 16px 16px;
    }
    .msg.user .msg-bubble {
      background: #F3703A;
      color: #fff;
      border-radius: 16px 0 16px 16px;
    }
    .msg-bubble strong { font-weight: 600; }

    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 10px 18px;
      background: #191346;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .dl-btn:hover { background: #F3703A; }
    .dl-btn:active { transform: scale(0.97); }

    .chips-bar {
      display: flex; 
      flex-wrap: wrap; 
      gap: 8px;
      padding: 10px 16px 6px;
      background: #fff;
      border-top: 1px solid #ebebf3;
    }
    .chip {
      font-family: 'Public Sans', sans-serif;
      font-size: 12px; 
      font-weight: 500;
      color: #191346; 
      background: #f0f0f8;
      border: 1px solid #dddde8; 
      border-radius: 20px;
      padding: 6px 13px; 
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }
    .chip:hover { background: #F3703A; color: #fff; border-color: #F3703A; }

    .input-bar {
      display: flex; 
      gap: 10px;
      padding: 12px 16px 14px;
      background: #fff;
      border-top: 1px solid #ebebf3;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      border: 1px solid #dddde8; 
      border-radius: 22px;
      padding: 10px 16px;
      font-family: 'Public Sans', sans-serif; 
      font-size: 14px; 
      line-height: 1.5;
      resize: none; 
      outline: none;
      min-height: 44px; 
      max-height: 130px; 
      overflow-y: auto;
      color: #191346; 
      background: #f7f7fb;
      transition: border-color .15s, background .15s;
    }
    .chat-input::placeholder { color: #aaa; }
    .chat-input:focus { border-color: #F3703A; background: #fff; }

    .send-btn {
      width: 44px; 
      height: 44px; 
      border-radius: 50%;
      background: #F3703A; 
      border: none; 
      cursor: pointer;
      display: flex; 
      align-items: center; 
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    .send-btn:hover { background: #e05e28; }
    .send-btn:active { transform: scale(.94); }
    .send-btn:disabled { background: #ccc; cursor: not-allowed; }
    .send-btn svg { fill: #fff; display: block; }

    .footer {
      text-align: center; 
      font-size: 11px; 
      color: #aaa;
      padding: 6px 16px 10px;
      background: #fff; 
      border-top: 1px solid #f0f0f6;
      flex-shrink: 0;
    }

    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

    @media (max-width: 480px) {
      .msg { max-width: 96%; }
      .logo { font-size: 20px; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">xtay</div>
    <div class="logo-tag">Calculadora de Enxoval<br>Estadias Inteligentes</div>
  </div>

  <div class="chat-area" id="chat"></div>

  <div class="chips-bar" id="chipsBar">
    <span class="chip" onclick="sendChip('Calcular enxoval: 10 studios')">🛏 Calcular enxoval</span>
    <span class="chip" onclick="sendChip('Quais são os fornecedores?')">🏭 Fornecedores</span>
    <span class="chip" onclick="sendChip('Qual o padrão têxtil?')">📋 Padrão têxtil</span>
    <span class="chip" onclick="sendChip('Como funciona o fator de giro?')">🔄 Fator de giro</span>
  </div>

  <div class="input-bar">
    <textarea class="chat-input" id="inp"
      placeholder="Descreva o empreendimento ou faça uma pergunta..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Enviar">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>

  <div class="footer">Xtay Smart Hotel &mdash; Uso interno &mdash; v3.2</div>
</div>

<script>
const ITENS = {
  'PROTETOR COLCHÃO QUEEN': { preco: 76, giro: 1.2, qtd: 1 },
  'LENÇOL QUEEN': { preco: 60, giro: 3, qtd: 2 },
  'EDREDON QUEEN': { preco: 180, giro: 1.2, qtd: 1 },
  'CAPA EDREDON QUEEN': { preco: 130, giro: 3, qtd: 1 },
  'COBERTOR QUEEN': { preco: 130, giro: 1.2, qtd: 1 },
  'TRAVESSEIRO QUEEN': { preco: 75, giro: 1.2, qtd: 2 },
  'PROTETOR TRAVESSEIRO QUEEN': { preco: 13, giro: 1.2, qtd: 2 },
  'FRONHA QUEEN': { preco: 12, giro: 3, qtd: 2 },
  'PROTETOR COLCHÃO SOLTEIRO': { preco: 76, giro: 1.2, qtd: 1 },
  'LENÇOL SOLTEIRO': { preco: 60, giro: 3, qtd: 2 },
  'EDREDON SOLTEIRO': { preco: 180, giro: 1.2, qtd: 1 },
  'CAPA EDREDON SOLTEIRO': { preco: 130, giro: 3, qtd: 1 },
  'COBERTOR SOLTEIRO': { preco: 130, giro: 1.2, qtd: 1 },
  'TRAVESSEIRO SOLTEIRO': { preco: 75, giro: 1.2, qtd: 1 },
  'PROTETOR TRAVESSEIRO SOLTEIRO': { preco: 13, giro: 1.2, qtd: 1 },
  'FRONHA SOLTEIRO': { preco: 12, giro: 3, qtd: 1 },
  'TOALHA BANHO': { preco: 56, giro: 3, qtd: 0 },
  'TOALHA ROSTO': { preco: 18, giro: 3, qtd: 0 },
  'TOALHA PISO': { preco: 17, giro: 3, qtd: 0 }
};

let chipsHidden = false;

function addMessage(role, text, withExcel) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? 'X' : 'VC';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  bubble.innerHTML = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');

  if (withExcel) {
    const br = document.createElement('br');
    const btn = document.createElement('button');
    btn.className = 'dl-btn';
    btn.innerHTML = `📊 Baixar Planilha Excel`;
    btn.onclick = withExcel;
    bubble.appendChild(br);
    bubble.appendChild(btn);
  }

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function hideChips() {
  if (!chipsHidden) {
    document.getElementById('chipsBar').style.display = 'none';
    chipsHidden = true;
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function processar(texto) {
  texto = texto.toLowerCase();

  if (texto.includes('fornecedor')) {
    return { 
      msg: '**Fornecedores Oficiais Xtay:**\n\n1. **Maxlink Têxtil**\n   www.maxlink.com.br\n   Contato: Ernesto\n   +55 11 99203-7376\n\n2. **Altenburg Linha Hotel**\n   www.altenburg.com.br/linha-hotel\n   Contato: Rui\n   +55 47 9982-7715',
      excel: null 
    };
  }

  if (texto.includes('padrão')) {
    return { 
      msg: '**Padrão Têxtil Xtay:**\n\n• **2 Lençóis** por cama (rotação 3x)\n• **1 Edredon** por cama (rotação 1.2x)\n• **1 Capa de Edredon** por cama (rotação 3x)\n• **1 Cobertor** por cama (rotação 1.2x)\n• **Travesseiros:** 2 por queen, 1 por solteiro (rotação 1.2x)\n• **Fronhas:** 2 por cama (rotação 3x)',
      excel: null 
    };
  }

  if (texto.includes('giro')) {
    return { 
      msg: '**Fator de Giro Xtay:**\n\n**Giro 3x** = Itens com rotação rápida\n   └ Lençóis, Fronhas, Toalhas\n   └ Substituição frequente\n\n**Giro 1.2x** = Itens com rotação lenta\n   └ Edredons, Cobertores, Protetores\n   └ Maior durabilidade',
      excel: null 
    };
  }

  // Parse tipologias
  const regex = /(\d+)\s*(studio|studios|1\s*dorm|2\s*dorm|3\s*dorm)/gi;
  const matches = [...texto.matchAll(regex)];

  if (matches.length === 0) {
    return { 
      msg: '**Por favor, descreva seu empreendimento:**\n\nExemplos:\n"10 studios"\n"5 aptos 2 dorm"\n"3 studios, 5 aptos 2 dorm, 2 aptos 3 dorm"',
      excel: null 
    };
  }

  let tipologias = [];
  let totalPecas = 0;
  let totalInvest = 0;
  let resumo = {};

  matches.forEach(m => {
    const qtd = parseInt(m[1]);
    const tipo = m[2].toLowerCase();

    let config;
    if (tipo.includes('studio')) {
      config = { nome: 'STUDIO', queens: 1, solteiros: 0, banheiros: 1 };
    } else if (tipo === '1 dorm' || tipo === '1dorm') {
      config = { nome: '1 DORMITÓRIO', queens: 1, solteiros: 0, banheiros: 1 };
    } else if (tipo === '2 dorm' || tipo === '2dorm') {
      config = { nome: '2 DORMITÓRIOS', queens: 1, solteiros: 1, banheiros: 2 };
    } else {
      config = { nome: '3 DORMITÓRIOS', queens: 1, solteiros: 2, banheiros: 2 };
    }

    let subtotal = 0;
    let tipoItens = [];

    // Queens
    ['PROTETOR COLCHÃO QUEEN', 'LENÇOL QUEEN', 'EDREDON QUEEN', 'CAPA EDREDON QUEEN', 'COBERTOR QUEEN', 'TRAVESSEIRO QUEEN', 'PROTETOR TRAVESSEIRO QUEEN', 'FRONHA QUEEN'].forEach(item => {
      const info = ITENS[item];
      const n = Math.ceil(info.qtd * config.queens * qtd * info.giro);
      const t = n * info.preco;
      tipoItens.push({ item, qtd: n, preco: info.preco, total: t });
      resumo[item] = (resumo[item] || 0) + n;
      totalPecas += n;
      subtotal += t;
    });

    // Solteiros
    for (let s = 0; s < config.solteiros; s++) {
      ['PROTETOR COLCHÃO SOLTEIRO', 'LENÇOL SOLTEIRO', 'EDREDON SOLTEIRO', 'CAPA EDREDON SOLTEIRO', 'COBERTOR SOLTEIRO', 'TRAVESSEIRO SOLTEIRO', 'PROTETOR TRAVESSEIRO SOLTEIRO', 'FRONHA SOLTEIRO'].forEach(item => {
        const info = ITENS[item];
        const n = Math.ceil(info.qtd * qtd * info.giro);
        const t = n * info.preco;
        tipoItens.push({ item, qtd: n, preco: info.preco, total: t });
        resumo[item] = (resumo[item] || 0) + n;
        totalPecas += n;
        subtotal += t;
      });
    }

    // Toalhas
    const pessoas = (config.queens * 2) + (config.solteiros * 1);
    ['TOALHA BANHO', 'TOALHA ROSTO'].forEach(item => {
      const info = ITENS[item];
      const n = Math.ceil(pessoas * qtd * info.giro);
      const t = n * info.preco;
      tipoItens.push({ item, qtd: n, preco: info.preco, total: t });
      resumo[item] = (resumo[item] || 0) + n;
      totalPecas += n;
      subtotal += t;
    });

    const pi = ITENS['TOALHA PISO'];
    const np = Math.ceil(config.banheiros * qtd * pi.giro);
    const tp = np * pi.preco;
    tipoItens.push({ item: 'TOALHA PISO', qtd: np, preco: pi.preco, total: tp });
    resumo['TOALHA PISO'] = (resumo['TOALHA PISO'] || 0) + np;
    totalPecas += np;
    subtotal += tp;

    tipologias.push({
      nome: config.nome,
      qtd: qtd,
      itens: tipoItens,
      subtotal: subtotal
    });

    totalInvest += subtotal;
  });

  const resumoArray = Object.entries(resumo).map(([item, qtd]) => ({
    item,
    qtd,
    preco: ITENS[item].preco,
    total: qtd * ITENS[item].preco
  }));

  const excelData = { tipologias, resumo: resumoArray, totalPecas, totalInvest };

  const detalhes = tipologias.map(t => `**${t.nome}:** ${t.qtd} aptos | R$ ${t.subtotal.toLocaleString('pt-BR')}`).join('\n');
  const msg = `**Cálculo Enxoval Xtay**\n\n${detalhes}\n\n**Total:** ${totalPecas} peças | R$ ${totalInvest.toLocaleString('pt-BR')}\n\n**Fornecedores:** Maxlink (+55 11 99203-7376) | Altenburg (+55 47 9982-7715)`;

  return { msg, excel: excelData };
}

function gerarExcel(data) {
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([
    ['RESUMO GERAL — ENXOVAL XTAY'],
    [],
    ['ITEM', 'QTD TOTAL', 'R$ UNITÁRIO', 'R$ TOTAL']
  ]);

  let r = 4;
  data.resumo.forEach(item => {
    XLSX.utils.sheet_add_aoa(ws, [[item.item, item.qtd, item.preco, item.total]], { origin: `A${r}` });
    r++;
  });

  r++;
  XLSX.utils.sheet_add_aoa(ws, [['TOTAL DE PEÇAS', data.totalPecas, '', '']], { origin: `A${r}` });
  r++;
  XLSX.utils.sheet_add_aoa(ws, [['INVESTIMENTO TOTAL', '', '', `R$ ${data.totalInvest.toLocaleString('pt-BR')}`]], { origin: `A${r}` });

  ws['!cols'] = [{ wch: 35 }, { wch: 14 }, { wch: 16 }, { wch: 18 }];
  XLSX.utils.book_append_sheet(wb, ws, 'RESUMO');

  data.tipologias.forEach(tip => {
    const tipWs = XLSX.utils.aoa_to_sheet([
      [tip.nome + ' — Enxoval Detalhado'],
      [],
      ['ITEM', 'QTD TOTAL', 'R$ UNITÁRIO', 'R$ TOTAL']
    ]);

    let tr = 4;
    tip.itens.forEach(item => {
      XLSX.utils.sheet_add_aoa(tipWs, [[item.item, item.qtd, item.preco, item.total]], { origin: `A${tr}` });
      tr++;
    });

    tr++;
    XLSX.utils.sheet_add_aoa(tipWs, [['SUBTOTAL', '', '', tip.subtotal]], { origin: `A${tr}` });
    tipWs['!cols'] = [{ wch: 35 }, { wch: 14 }, { wch: 16 }, { wch: 18 }];
    XLSX.utils.book_append_sheet(wb, tipWs, tip.nome.substring(0, 31));
  });

  XLSX.writeFile(wb, 'Enxoval_Xtay.xlsx');
}

function sendMessage() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  hideChips();
  addMessage('user', text);
  inp.value = '';
  inp.style.height = '';

  setTimeout(() => {
    const { msg, excel } = processar(text);
    addMessage('bot', msg, excel ? () => gerarExcel(excel) : null);
  }, 300);
}

function sendChip(text) {
  hideChips();
  addMessage('user', text);

  setTimeout(() => {
    const { msg, excel } = processar(text);
    addMessage('bot', msg, excel ? () => gerarExcel(excel) : null);
  }, 300);
}

// Boas-vindas
addMessage('bot', `👋 Olá! Sou a **Calculadora de Enxoval Xtay**.\n\nPosso te ajudar a dimensionar o enxoval completo do seu empreendimento — quantidade de peças, investimento estimado e geração automática da **planilha Excel** com todos os detalhes.\n\nUse os atalhos abaixo ou descreva o empreendimento para começar!`);
</script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</body>
</html>
