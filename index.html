<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Enxoval — Xtay Smart Hotel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Public+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Public Sans', sans-serif; background: #f0f0f6; color: #191346; }
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 780px; margin: 0 auto; background: #fff; box-shadow: 0 0 48px rgba(25,19,70,0.10); }
    .header { background: #191346; padding: 14px 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .logo { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 24px; color: #F3703A; }
    .logo-tag { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.5); border-left: 1px solid rgba(255,255,255,0.18); padding-left: 14px; }
    .chat-area { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; background: #f7f7f9; }
    .msg { display: flex; gap: 10px; align-items: flex-start; max-width: 90%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }
    .msg-avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 12px; }
    .msg.bot .msg-avatar { background: #F3703A; color: #fff; }
    .msg.user .msg-avatar { background: #191346; color: #fff; }
    .msg-bubble { padding: 11px 15px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
    .msg.bot .msg-bubble { background: #fff; color: #191346; border: 0.5px solid #e0e0ec; border-radius: 0 16px 16px 16px; }
    .msg.user .msg-bubble { background: #F3703A; color: #fff; border-radius: 16px 0 16px 16px; }
    .msg-bubble strong { font-weight: 600; }
    .dl-btn { display: inline-flex; align-items: center; gap: 8px; margin-top: 14px; padding: 10px 18px; background: #191346; color: #fff; border: none; border-radius: 10px; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
    .dl-btn:hover { background: #F3703A; }
    .chips-bar { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 16px 6px; background: #fff; border-top: 1px solid #ebebf3; }
    .chip { font-size: 12px; font-weight: 500; color: #191346; background: #f0f0f8; border: 1px solid #dddde8; border-radius: 20px; padding: 6px 13px; cursor: pointer; }
    .chip:hover { background: #F3703A; color: #fff; }
    .input-bar { display: flex; gap: 10px; padding: 12px 16px 14px; background: #fff; border-top: 1px solid #ebebf3; align-items: flex-end; }
    .chat-input { flex: 1; border: 1px solid #dddde8; border-radius: 22px; padding: 10px 16px; font-family: 'Public Sans', sans-serif; font-size: 14px; resize: none; outline: none; min-height: 44px; max-height: 130px; color: #191346; background: #f7f7fb; }
    .chat-input:focus { border-color: #F3703A; background: #fff; }
    .send-btn { width: 44px; height: 44px; border-radius: 50%; background: #F3703A; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .send-btn:hover { background: #e05e28; }
    .send-btn svg { fill: #fff; }
    .footer { text-align: center; font-size: 11px; color: #aaa; padding: 6px 16px 10px; background: #fff; border-top: 1px solid #f0f0f6; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">xtay</div>
    <div class="logo-tag">Calculadora de Enxoval<br>Estadias Inteligentes</div>
  </div>
  <div class="chat-area" id="chat"></div>
  <div class="chips-bar" id="chipsBar">
    <span class="chip" onclick="enviarChip('Calcular enxoval: 10 studios')">🛏 Calcular enxoval</span>
    <span class="chip" onclick="enviarChip('Quais são os fornecedores?')">🏭 Fornecedores</span>
    <span class="chip" onclick="enviarChip('Qual o padrão dos lençóis?')">📋 Padrão têxtil</span>
    <span class="chip" onclick="enviarChip('Como funciona o fator de giro?')">🔄 Fator de giro</span>
  </div>
  <div class="input-bar">
    <textarea class="chat-input" id="inp" placeholder="Ex: 10 studios, 5 aptos 2 dorm..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviarMensagem()}"></textarea>
    <button class="send-btn" onclick="enviarMensagem()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="footer">Xtay Smart Hotel — v3.1</div>
</div>

<script>
const TABELA = {
  'PROTETOR COLCHÃO QUEEN': { preco: 76, giro: 1.2, qtd: 1 },
  'LENÇOL QUEEN': { preco: 60, giro: 3, qtd: 2 },
  'EDREDON QUEEN': { preco: 180, giro: 1.2, qtd: 1 },
  'CAPA EDREDON QUEEN': { preco: 130, giro: 3, qtd: 1 },
  'COBERTOR QUEEN': { preco: 130, giro: 1.2, qtd: 1 },
  'TRAVESSEIRO QUEEN': { preco: 75, giro: 1.2, qtd: 2 },
  'PROTETOR TRAVESSEIRO QUEEN': { preco: 13, giro: 1.2, qtd: 2 },
  'FRONHA QUEEN': { preco: 12, giro: 3, qtd: 2 },
  'PROTETOR COLCHÃO SOLTEIRO': { preco: 76, giro: 1.2, qtd: 1 },
  'LENÇOL SOLTEIRO': { preco: 60, giro: 3, qtd: 2 },
  'EDREDON SOLTEIRO': { preco: 180, giro: 1.2, qtd: 1 },
  'CAPA EDREDON SOLTEIRO': { preco: 130, giro: 3, qtd: 1 },
  'COBERTOR SOLTEIRO': { preco: 130, giro: 1.2, qtd: 1 },
  'TRAVESSEIRO SOLTEIRO': { preco: 75, giro: 1.2, qtd: 1 },
  'PROTETOR TRAVESSEIRO SOLTEIRO': { preco: 13, giro: 1.2, qtd: 1 },
  'FRONHA SOLTEIRO': { preco: 12, giro: 3, qtd: 1 },
  'TOALHA BANHO': { preco: 56, giro: 3, qtd: 0 },
  'TOALHA ROSTO': { preco: 18, giro: 3, qtd: 0 },
  'TOALHA PISO': { preco: 17, giro: 3, qtd: 0 }
};

function addMessage(role, text, excel) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? 'X' : 'VC';
  
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
  
  if (excel) {
    const br = document.createElement('br');
    const btn = document.createElement('button');
    btn.className = 'dl-btn';
    btn.innerHTML = '📊 Baixar Planilha Excel';
    btn.onclick = () => gerarExcel(excel);
    bubble.appendChild(br);
    bubble.appendChild(btn);
  }
  
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function calcular(text) {
  text = text.toLowerCase();
  
  if (text.includes('fornecedor')) {
    return { msg: '**Fornecedores Oficiais:**\n\n1. **Maxlink Têxtil**\n   +55 11 99203-7376\n\n2. **Altenburg Linha Hotel**\n   +55 47 9982-7715', excel: null };
  }
  
  if (text.includes('padrão') || text.includes('lençol')) {
    return { msg: '**Padrão Têxtil:**\n\n2 lençóis/fronhas por cama (giro 3x)\n1 edredon por cama (giro 1.2x)\n1-2 travesseiros/protetores por cama (giro 1.2x)', excel: null };
  }
  
  if (text.includes('giro')) {
    return { msg: '**Fator de Giro:**\n\nGiro 3x = Rotação rápida (lençóis, toalhas)\nGiro 1.2x = Rotação lenta (edredons, protetores)', excel: null };
  }
  
  // Procurar padrão: número + studio/dorm
  const regex = /(\d+)\s*(studio|studios|1\s*dorm|2\s*dorm|3\s*dorm)/gi;
  const matches = [...text.matchAll(regex)];
  
  if (matches.length === 0) {
    return { msg: 'Descreva o empreendimento:\n"10 studios" ou "5 aptos 2 dorm, 3 aptos 3 dorm"', excel: null };
  }
  
  let tipologias = [];
  let totalPecas = 0;
  let totalInvest = 0;
  let resumo = {};
  
  matches.forEach(m => {
    const qtd = parseInt(m[1]);
    const tipo = m[2].toLowerCase();
    
    let config;
    if (tipo.includes('studio')) {
      config = { nome: 'STUDIO', queens: 1, solteiros: 0, banheiros: 1 };
    } else if (tipo.includes('1')) {
      config = { nome: '1 DORM', queens: 1, solteiros: 0, banheiros: 1 };
    } else if (tipo.includes('2')) {
      config = { nome: '2 DORM', queens: 1, solteiros: 1, banheiros: 2 };
    } else {
      config = { nome: '3 DORM', queens: 1, solteiros: 2, banheiros: 2 };
    }
    
    let itens = [];
    let subtotal = 0;
    
    // Queens
    ['PROTETOR COLCHÃO QUEEN', 'LENÇOL QUEEN', 'EDREDON QUEEN', 'CAPA EDREDON QUEEN', 'COBERTOR QUEEN', 'TRAVESSEIRO QUEEN', 'PROTETOR TRAVESSEIRO QUEEN', 'FRONHA QUEEN'].forEach(item => {
      const info = TABELA[item];
      const n = Math.ceil(info.qtd * qtd * info.giro);
      const t = n * info.preco;
      itens.push({ nome: item, qtd: n, preco: info.preco, total: t });
      resumo[item] = (resumo[item] || 0) + n;
      totalPecas += n;
      subtotal += t;
    });
    
    // Solteiros
    ['PROTETOR COLCHÃO SOLTEIRO', 'LENÇOL SOLTEIRO', 'EDREDON SOLTEIRO', 'CAPA EDREDON SOLTEIRO', 'COBERTOR SOLTEIRO', 'TRAVESSEIRO SOLTEIRO', 'PROTETOR TRAVESSEIRO SOLTEIRO', 'FRONHA SOLTEIRO'].forEach(item => {
      for (let i = 0; i < config.solteiros; i++) {
        const info = TABELA[item];
        const n = Math.ceil(info.qtd * qtd * info.giro);
        const t = n * info.preco;
        itens.push({ nome: item, qtd: n, preco: info.preco, total: t });
        resumo[item] = (resumo[item] || 0) + n;
        totalPecas += n;
        subtotal += t;
      }
    });
    
    // Toalhas
    const pessoas = (config.queens * 2) + (config.solteiros * 1);
    ['TOALHA BANHO', 'TOALHA ROSTO'].forEach(item => {
      const info = TABELA[item];
      const n = Math.ceil(pessoas * qtd * info.giro);
      const t = n * info.preco;
      itens.push({ nome: item, qtd: n, preco: info.preco, total: t });
      resumo[item] = (resumo[item] || 0) + n;
      totalPecas += n;
      subtotal += t;
    });
    
    const toalhaPiso = TABELA['TOALHA PISO'];
    const nPiso = Math.ceil(config.banheiros * qtd * toalhaPiso.giro);
    const tPiso = nPiso * toalhaPiso.preco;
    itens.push({ nome: 'TOALHA PISO', qtd: nPiso, preco: toalhaPiso.preco, total: tPiso });
    resumo['TOALHA PISO'] = (resumo['TOALHA PISO'] || 0) + nPiso;
    totalPecas += nPiso;
    subtotal += tPiso;
    
    tipologias.push({
      nome: config.nome,
      qtd: qtd,
      itens: itens,
      subtotal: subtotal
    });
    
    totalInvest += subtotal;
  });
  
  const resumoArr = Object.entries(resumo).map(([item, qtd]) => ({
    item,
    qtd,
    preco: TABELA[item].preco,
    total: qtd * TABELA[item].preco
  }));
  
  const excelData = {
    tipologias,
    resumo: resumoArr,
    totalPecas,
    totalInvest
  };
  
  const msg = `**Cálculo Enxoval Xtay**\n\n${tipologias.map(t => `${t.nome}: ${t.qtd} aptos | R$ ${t.subtotal.toLocaleString('pt-BR')}`).join('\n')}\n\n**Total:** ${totalPecas} peças | R$ ${totalInvest.toLocaleString('pt-BR')}`;
  
  return { msg, excel: excelData };
}

function gerarExcel(data) {
  const wb = XLSX.utils.book_new();
  
  // Resumo
  const ws = {};
  let r = 1;
  ws['A' + r] = { v: 'ENXOVAL XTAY', t: 's' };
  r += 2;
  
  ws['A' + r] = { v: 'ITEM', t: 's' };
  ws['B' + r] = { v: 'QTD', t: 's' };
  ws['C' + r] = { v: 'PREÇO', t: 's' };
  ws['D' + r] = { v: 'TOTAL', t: 's' };
  r++;
  
  data.resumo.forEach(item => {
    ws['A' + r] = { v: item.item, t: 's' };
    ws['B' + r] = { v: item.qtd, t: 'n' };
    ws['C' + r] = { v: item.preco, t: 'n' };
    ws['D' + r] = { v: item.total, t: 'n' };
    r++;
  });
  
  r++;
  ws['A' + r] = { v: 'TOTAL PEÇAS', t: 's' };
  ws['D' + r] = { v: data.totalPecas, t: 'n' };
  r++;
  
  ws['A' + r] = { v: 'TOTAL INVESTIMENTO', t: 's' };
  ws['D' + r] = { v: data.totalInvest, t: 'n' };
  
  ws['!ref'] = 'A1:D' + r;
  ws['!cols'] = [{ wch: 35 }, { wch: 12 }, { wch: 12 }, { wch: 15 }];
  
  XLSX.utils.book_append_sheet(wb, ws, 'Resumo');
  XLSX.writeFile(wb, 'Enxoval_Xtay.xlsx');
}

function enviarMensagem() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  
  addMessage('user', text);
  inp.value = '';
  
  const { msg, excel } = calcular(text);
  setTimeout(() => {
    addMessage('bot', msg, excel);
  }, 300);
}

function enviarChip(text) {
  document.getElementById('chipsBar').style.display = 'none';
  addMessage('user', text);
  const { msg, excel } = calcular(text);
  setTimeout(() => {
    addMessage('bot', msg, excel);
  }, 300);
}

addMessage('bot', '👋 Olá! Sou a **Calculadora de Enxoval Xtay**.\n\nDescreva seu empreendimento:\n"10 studios" ou "5 aptos 2 dorm"');
</script>
</body>
</html>
