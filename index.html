<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Enxoval — Xtay Smart Hotel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Public Sans', sans-serif; background: #f0f0f6; height: 100vh; }
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; background: white; }
    .header { background: #191346; padding: 20px; color: white; }
    .header .logo { font-size: 28px; font-weight: bold; color: #F3703A; }
    .header .tag { font-size: 12px; opacity: 0.8; }
    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; gap: 10px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 12px; flex-shrink: 0; }
    .msg.bot .avatar { background: #F3703A; }
    .msg.user .avatar { background: #191346; }
    .bubble { padding: 12px 16px; border-radius: 12px; line-height: 1.5; word-wrap: break-word; }
    .msg.bot .bubble { background: #f0f0f8; color: #191346; }
    .msg.user .bubble { background: #F3703A; color: white; }
    .bubble strong { font-weight: 600; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 20px; background: white; border-top: 1px solid #eee; }
    .chip { padding: 8px 14px; background: #f0f0f8; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; font-size: 13px; }
    .chip:hover { background: #F3703A; color: white; border-color: #F3703A; }
    .input-area { display: flex; gap: 10px; padding: 12px 20px; background: white; border-top: 1px solid #eee; }
    input { flex: 1; border: 1px solid #ddd; border-radius: 24px; padding: 10px 16px; font-size: 14px; outline: none; }
    input:focus { border-color: #F3703A; }
    button { width: 40px; height: 40px; border-radius: 50%; background: #F3703A; color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    button:hover { background: #e05e28; }
    .btn-excel { display: inline-block; margin-top: 10px; padding: 8px 12px; background: #191346; color: white; border-radius: 6px; cursor: pointer; font-size: 12px; border: none; }
    .btn-excel:hover { background: #F3703A; }
    .footer { text-align: center; padding: 10px; font-size: 11px; color: #999; background: white; }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">xtay</div>
    <div class="tag">Calculadora de Enxoval</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="chips" id="chips">
    <div class="chip" onclick="enviar('10 studios')">🛏 10 studios</div>
    <div class="chip" onclick="enviar('Fornecedores')">🏭 Fornecedores</div>
    <div class="chip" onclick="enviar('Padrão têxtil')">📋 Padrão</div>
    <div class="chip" onclick="enviar('Fator de giro')">🔄 Giro</div>
  </div>

  <div class="input-area">
    <input id="inp" type="text" placeholder="Ex: 10 studios, 5 aptos 2 dorm..." onkeypress="if(event.key==='Enter') enviar(this.value); this.value=''" />
    <button onclick="var inp=document.getElementById('inp'); enviar(inp.value); inp.value='';">➤</button>
  </div>

  <div class="footer">Xtay Smart Hotel v3.2</div>
</div>

<script>
const ITENS = {
  'PROTETOR COLCHÃO QUEEN': { preco: 76, giro: 1.2, qtd: 1 },
  'LENÇOL QUEEN': { preco: 60, giro: 3, qtd: 2 },
  'EDREDON QUEEN': { preco: 180, giro: 1.2, qtd: 1 },
  'CAPA EDREDON QUEEN': { preco: 130, giro: 3, qtd: 1 },
  'COBERTOR QUEEN': { preco: 130, giro: 1.2, qtd: 1 },
  'TRAVESSEIRO QUEEN': { preco: 75, giro: 1.2, qtd: 2 },
  'PROTETOR TRAVESSEIRO QUEEN': { preco: 13, giro: 1.2, qtd: 2 },
  'FRONHA QUEEN': { preco: 12, giro: 3, qtd: 2 },
  'PROTETOR COLCHÃO SOLTEIRO': { preco: 76, giro: 1.2, qtd: 1 },
  'LENÇOL SOLTEIRO': { preco: 60, giro: 3, qtd: 2 },
  'EDREDON SOLTEIRO': { preco: 180, giro: 1.2, qtd: 1 },
  'CAPA EDREDON SOLTEIRO': { preco: 130, giro: 3, qtd: 1 },
  'COBERTOR SOLTEIRO': { preco: 130, giro: 1.2, qtd: 1 },
  'TRAVESSEIRO SOLTEIRO': { preco: 75, giro: 1.2, qtd: 1 },
  'PROTETOR TRAVESSEIRO SOLTEIRO': { preco: 13, giro: 1.2, qtd: 1 },
  'FRONHA SOLTEIRO': { preco: 12, giro: 3, qtd: 1 },
  'TOALHA BANHO': { preco: 56, giro: 3, qtd: 0 },
  'TOALHA ROSTO': { preco: 18, giro: 3, qtd: 0 },
  'TOALHA PISO': { preco: 17, giro: 3, qtd: 0 }
};

function addMsg(role, text, excel) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;
  
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'bot' ? 'X' : 'VC';
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  
  if (excel) {
    const btn = document.createElement('button');
    btn.className = 'btn-excel';
    btn.textContent = '📊 Baixar Excel';
    btn.onclick = () => gerarExcel(excel);
    bubble.appendChild(document.createElement('br'));
    bubble.appendChild(btn);
  }
  
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function processar(texto) {
  texto = texto.toLowerCase().trim();
  
  if (!texto) return;
  
  if (texto.includes('fornecedor')) {
    return { msg: '**Fornecedores Oficiais Xtay:**\n\n1. **Maxlink Têxtil**\n   Ernesto: +55 11 99203-7376\n\n2. **Altenburg Linha Hotel**\n   Rui: +55 47 9982-7715', excel: null };
  }
  
  if (texto.includes('padrão')) {
    return { msg: '**Padrão Têxtil Xtay:**\n\n• 2 lençóis por cama (giro 3x)\n• 1 edredon por cama (giro 1.2x)\n• 2 travesseiros por cama (giro 1.2x)\n• 2 fronhas por cama (giro 3x)', excel: null };
  }
  
  if (texto.includes('giro')) {
    return { msg: '**Fator de Giro:**\n\n• Giro 3x = Itens com rotação rápida (lençóis, fronhas, toalhas)\n• Giro 1.2x = Itens com rotação lenta (edredons, cobertores, protetores)', excel: null };
  }
  
  // Parseador de tipologias
  const regex = /(\d+)\s*(studio|studios|1\s*dorm|2\s*dorm|3\s*dorm)/gi;
  const matches = [...texto.matchAll(regex)];
  
  if (matches.length === 0) {
    return { msg: 'Por favor, descreva o empreendimento:\n"10 studios" ou "5 aptos 2 dorm, 3 aptos 3 dorm"', excel: null };
  }
  
  let totalPecas = 0;
  let totalInvest = 0;
  let resumo = {};
  let detalhes = [];
  
  matches.forEach(match => {
    const qtd = parseInt(match[1]);
    const tipo = match[2].toLowerCase();
    
    let config = {};
    if (tipo.includes('studio')) {
      config = { nome: 'STUDIO', queens: 1, solteiros: 0, banheiros: 1 };
    } else if (tipo === '1 dorm' || tipo === '1dorm') {
      config = { nome: '1 DORMITÓRIO', queens: 1, solteiros: 0, banheiros: 1 };
    } else if (tipo === '2 dorm' || tipo === '2dorm') {
      config = { nome: '2 DORMITÓRIOS', queens: 1, solteiros: 1, banheiros: 2 };
    } else {
      config = { nome: '3 DORMITÓRIOS', queens: 1, solteiros: 2, banheiros: 2 };
    }
    
    let subtotal = 0;
    
    // Queens
    ['PROTETOR COLCHÃO QUEEN', 'LENÇOL QUEEN', 'EDREDON QUEEN', 'CAPA EDREDON QUEEN', 'COBERTOR QUEEN', 'TRAVESSEIRO QUEEN', 'PROTETOR TRAVESSEIRO QUEEN', 'FRONHA QUEEN'].forEach(item => {
      const info = ITENS[item];
      const n = Math.ceil(info.qtd * config.queens * qtd * info.giro);
      const t = n * info.preco;
      resumo[item] = (resumo[item] || 0) + n;
      totalPecas += n;
      subtotal += t;
    });
    
    // Solteiros
    for (let s = 0; s < config.solteiros; s++) {
      ['PROTETOR COLCHÃO SOLTEIRO', 'LENÇOL SOLTEIRO', 'EDREDON SOLTEIRO', 'CAPA EDREDON SOLTEIRO', 'COBERTOR SOLTEIRO', 'TRAVESSEIRO SOLTEIRO', 'PROTETOR TRAVESSEIRO SOLTEIRO', 'FRONHA SOLTEIRO'].forEach(item => {
        const info = ITENS[item];
        const n = Math.ceil(info.qtd * qtd * info.giro);
        const t = n * info.preco;
        resumo[item] = (resumo[item] || 0) + n;
        totalPecas += n;
        subtotal += t;
      });
    }
    
    // Toalhas
    const pessoas = (config.queens * 2) + (config.solteiros * 1);
    ['TOALHA BANHO', 'TOALHA ROSTO'].forEach(item => {
      const info = ITENS[item];
      const n = Math.ceil(pessoas * qtd * info.giro);
      const t = n * info.preco;
      resumo[item] = (resumo[item] || 0) + n;
      totalPecas += n;
      subtotal += t;
    });
    
    const pi = ITENS['TOALHA PISO'];
    const np = Math.ceil(config.banheiros * qtd * pi.giro);
    const tp = np * pi.preco;
    resumo['TOALHA PISO'] = (resumo['TOALHA PISO'] || 0) + np;
    totalPecas += np;
    subtotal += tp;
    
    totalInvest += subtotal;
    detalhes.push(`**${config.nome}:** ${qtd} aptos → R$ ${subtotal.toLocaleString('pt-BR')}`);
  });
  
  const msg = `**Cálculo Enxoval Xtay**\n\n${detalhes.join('\n')}\n\n**TOTAIS:**\n• Peças: ${totalPecas}\n• Investimento: R$ ${totalInvest.toLocaleString('pt-BR')}\n\n**Fornecedores:** Maxlink (+55 11 99203-7376) | Altenburg (+55 47 9982-7715)`;
  
  const excelData = {
    resumo: Object.entries(resumo).map(([item, qtd]) => ({
      item,
      qtd,
      preco: ITENS[item].preco,
      total: qtd * ITENS[item].preco
    })),
    totalPecas,
    totalInvest
  };
  
  return { msg, excel: excelData };
}

function enviar(texto) {
  if (!texto.trim()) return;
  
  document.getElementById('chips').style.display = 'none';
  addMsg('user', texto);
  
  const { msg, excel } = processar(texto);
  setTimeout(() => {
    addMsg('bot', msg, excel);
  }, 200);
}

function gerarExcel(data) {
  let csv = 'ENXOVAL XTAY\n\nITEM,QTD,PREÇO,TOTAL\n';
  data.resumo.forEach(item => {
    csv += `"${item.item}",${item.qtd},${item.preco},${item.total}\n`;
  });
  csv += `\nTOTAL PEÇAS,${data.totalPecas}\nTOTAL INVESTIMENTO,R$ ${data.totalInvest.toLocaleString('pt-BR')}\n`;
  
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Enxoval_Xtay.csv';
  a.click();
}

// Mensagem de boas-vindas
addMsg('bot', '👋 Olá! Sou a **Calculadora de Enxoval Xtay**.\n\nDescreva seu empreendimento:\n"10 studios" ou "5 aptos 2 dorm, 3 aptos 3 dorm"');
</script>

</body>
</html>
